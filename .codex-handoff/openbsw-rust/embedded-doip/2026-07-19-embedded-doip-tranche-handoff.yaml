date: 2026-07-19
project: openbsw-rust
part: embedded-doip
task: hardware-independent-embedded-doip-tranche
achievement:
  - extracted the live DoIP entity into a portable no_std allocation-free
    core (crates/bsw-doip/src/entity.rs, DoIpEntity) covering discovery,
    announcements, admission, routing activation, alive checks, timeouts,
    diagnostics, ordered partial sends, backpressure, link recovery, and
    lifecycle
  - added generic bounded datagram and link contracts to bsw-ethernet
    (lwip::DatagramApi, lwip::LinkState) reusing the existing SocketApi
    for TCP; extended the deterministic FakeStack with a bounded UDP pool
    and link injection
  - added PosixSocketStack (SocketApi + DatagramApi + LinkState over the
    audited std::net adapters) and rebuilt PosixDoIpEntity as a thin
    adapter over the portable core with an unchanged public API
  - added DiagnosticReceiveState suspend/resume so fragmented diagnostic
    messages survive chunked receive cycles and pool allocations are
    released on teardown
  - deterministic embedded composition with bsw-reference-core
    DiagnosticCore proves DoCAN and DoIP share one production UDS state
    under bsw-lifecycle control, including restart and link-loss recovery
  - 34-scenario deterministic behavioral suite, composition tests,
    POSIX/embedded protocol-equivalence test, fake/POSIX boundary
    contract tests, and a new bounded doip_entity fuzz target
decisions_with_rationale:
  - decision: keep the RA-plus-diagnostic same-receive-chunk source
      snapshot behavior of the pre-tranche POSIX entity
    rationale: behavioral parity with the closed mandatory release;
      documented in docs/port/doip-parity.md as a known limitation
  - decision: entity borrows the network backend per call instead of
      owning it
    rationale: lets deterministic tests share one fake stack between
      entity and clients and keeps the core free of platform types
  - decision: record the tranche in a dedicated doc instead of touching
      parity-manifest/status totals
    rationale: mandatory 1,092/1,092 and 37/37 totals must stay intact;
      the tranche is optional post-release expansion
