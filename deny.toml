[advisories]
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2026-0110", reason = "transitive bare-metal 0.2.5 through cortex-m 0.7.7 is archived; the advisory has no safe upgrade and reports no vulnerability" },
]

[licenses]
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "MIT",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
# Workspace path dependencies intentionally omit registry versions. External
# sources and locked resolution are enforced by check_dependencies.py.
wildcards = "allow"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
